<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUSSO Trading Bot Dashboard</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.1.min.js" charset="utf-8"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #0f1535 0%, #0a0e27 100%);
            padding: 20px 30px;
            border-bottom: 1px solid #1e2a4a;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header p {
            font-size: 14px;
            color: #6c86a3;
            margin-top: 5px;
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px;
        }
        
        .stat-card {
            background: #11162e;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #1e2a4a;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            border-color: #2a3a60;
        }
        
        .stat-title {
            font-size: 13px;
            color: #6c86a3;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-top: 10px;
        }
        
        .stat-change {
            font-size: 12px;
            margin-top: 8px;
        }
        
        .positive {
            color: #00e88f;
        }
        
        .negative {
            color: #ff4757;
        }
        
        /* Assets Table */
        .section {
            padding: 0 30px 30px 30px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .assets-table {
            background: #11162e;
            border-radius: 16px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            text-align: left;
            padding: 15px 20px;
            background: #0d1228;
            color: #6c86a3;
            font-weight: 500;
            font-size: 13px;
            border-bottom: 1px solid #1e2a4a;
        }
        
        td {
            padding: 15px 20px;
            border-bottom: 1px solid #1a1f3e;
            font-size: 14px;
        }
        
        tr:hover {
            background: #161d3a;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .badge-call {
            background: rgba(0, 232, 143, 0.15);
            color: #00e88f;
        }
        
        .badge-put {
            background: rgba(255, 71, 87, 0.15);
            color: #ff4757;
        }
        
        .badge-active {
            background: rgba(0, 232, 143, 0.15);
            color: #00e88f;
        }
        
        .badge-inactive {
            background: rgba(108, 134, 163, 0.15);
            color: #6c86a3;
        }
        
        .toggle-btn {
            background: #1e2a4a;
            border: none;
            color: #e0e0e0;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }
        
        .toggle-btn:hover {
            background: #2a3a60;
        }
        
        .optimize-btn {
            background: linear-gradient(135deg, #7b2ff7, #9b4dff);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            margin-left: 8px;
        }
        
        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .chart-card {
            background: #11162e;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #1e2a4a;
        }
        
        .chart-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #6c86a3;
        }
        
        /* Signal Alerts */
        .signal-alert {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1e2a4a;
            border-left: 4px solid #00e88f;
            padding: 15px 20px;
            border-radius: 12px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        /* Refresh Status */
        .refresh-status {
            font-size: 11px;
            color: #6c86a3;
            margin-top: 20px;
            text-align: center;
            padding: 15px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                padding: 15px;
                gap: 12px;
            }
            
            .section {
                padding: 0 15px 15px 15px;
            }
            
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            th, td {
                padding: 10px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 RUSSO Trading Bot Dashboard</h1>
        <p>Multi-Asset Trading Signals | Real-Time Monitoring | Genetic Optimization</p>
    </div>
    
    <div class="stats-grid" id="statsGrid">
        <!-- Stats will be populated by JS -->
    </div>
    
    <div class="section">
        <div class="section-title">
            📊 Asset Performance
        </div>
        <div class="assets-table">
            <table id="assetsTable">
                <thead>
                    <tr><th>Asset</th><th>Signals</th><th>Wins</th><th>Losses</th><th>Win Rate</th><th>Profit</th><th>Avg Conf</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody id="assetsTableBody">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </div>
    
    <div class="section">
        <div class="section-title">
            📈 Performance Charts
        </div>
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">📉 Cumulative Profit</div>
                <div id="profitChart"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">🎯 Rolling Win Rate (20 trades)</div>
                <div id="winRateChart"></div>
            </div>
        </div>
    </div>
    
    <div class="refresh-status" id="refreshStatus">
        Last updated: --:--:--
    </div>
    
    <script>
        var socket = io();
        var profitChart = null;
        var winRateChart = null;
        
        // Initialize charts
        function initCharts() {
            var profitDiv = document.getElementById('profitChart');
            var winRateDiv = document.getElementById('winRateChart');
            
            profitChart = Plotly.newPlot(profitDiv, [{
                y: [],
                type: 'scatter',
                mode: 'lines',
                name: 'Cumulative Profit',
                line: { color: '#00e88f', width: 2 },
                fill: 'tozeroy',
                fillcolor: 'rgba(0, 232, 143, 0.1)'
            }], {
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                font: { color: '#e0e0e0' },
                xaxis: { title: 'Trade Number', gridcolor: '#1e2a4a' },
                yaxis: { title: 'Profit ($)', gridcolor: '#1e2a4a' },
                margin: { t: 20, r: 20, l: 50, b: 30 }
            });
            
            winRateChart = Plotly.newPlot(winRateDiv, [{
                y: [],
                type: 'scatter',
                mode: 'lines',
                name: 'Win Rate %',
                line: { color: '#7b2ff7', width: 2 }
            }], {
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                font: { color: '#e0e0e0' },
                xaxis: { title: 'Trade Number', gridcolor: '#1e2a4a' },
                yaxis: { title: 'Win Rate (%)', range: [0, 100], gridcolor: '#1e2a4a' },
                margin: { t: 20, r: 20, l: 50, b: 30 }
            });
        }
        
        // Update stats
        function updateStats(stats) {
            var html = '';
            
            var cards = [
                { title: 'Total Signals', value: stats.overall.total_signals, color: '#00d4ff' },
                { title: 'Win Rate', value: stats.overall.win_rate.toFixed(1) + '%', color: '#00e88f' },
                { title: 'Total Profit', value: '$' + stats.overall.total_profit.toFixed(2), color: stats.overall.total_profit >= 0 ? '#00e88f' : '#ff4757' },
                { title: 'Active Assets', value: stats.assets.filter(a => a.is_active).length + '/' + stats.assets.length, color: '#7b2ff7' }
            ];
            
            cards.forEach(card => {
                html += `
                    <div class="stat-card">
                        <div class="stat-title">${card.title}</div>
                        <div class="stat-value" style="color: ${card.color}">${card.value}</div>
                    </div>
                `;
            });
            
            document.getElementById('statsGrid').innerHTML = html;
        }
        
        // Update assets table
        function updateAssetsTable(assets) {
            var html = '';
            
            assets.forEach(asset => {
                var winRateClass = asset.win_rate >= 60 ? 'positive' : (asset.win_rate >= 45 ? '' : 'negative');
                var profitClass = asset.total_profit >= 0 ? 'positive' : 'negative';
                var statusClass = asset.is_active ? 'badge-active' : 'badge-inactive';
                var statusText = asset.is_active ? 'Active' : 'Inactive';
                
                html += `
                    <tr>
                        <td><strong>${asset.symbol}</strong><br><span style="font-size: 11px; color: #6c86a3;">${asset.name}</span></td>
                        <td>${asset.total_signals}</td>
                        <td class="positive">${asset.wins}</td>
                        <td class="negative">${asset.losses}</td>
                        <td class="${winRateClass}">${asset.win_rate.toFixed(1)}%</td>
                        <td class="${profitClass}">$${asset.total_profit.toFixed(2)}</td>
                        <td>${asset.avg_confidence}%</td>
                        <td><span class="badge ${statusClass}">${statusText}</span></td>
                        <td>
                            <button class="toggle-btn" onclick="toggleAsset('${asset.symbol}')">Toggle</button>
                            <button class="optimize-btn" onclick="optimizeAsset('${asset.symbol}')">Optimize</button>
                        </td>
                    </tr>
                `;
            });
            
            document.getElementById('assetsTableBody').innerHTML = html;
        }
        
        // Toggle asset
        function toggleAsset(symbol) {
            fetch(`/api/asset/${symbol}/toggle`, { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        loadData();
                    }
                });
        }
        
        // Optimize asset
        function optimizeAsset(symbol) {
            var btn = event.target;
            btn.textContent = 'Running...';
            btn.disabled = true;
            
            fetch(`/api/optimize/${symbol}`, { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showAlert(`Optimization complete for ${symbol}! New parameters activated.`, 'success');
                        loadData();
                    } else {
                        showAlert(`Optimization failed: ${data.error}`, 'error');
                    }
                })
                .finally(() => {
                    btn.textContent = 'Optimize';
                    btn.disabled = false;
                });
        }
        
        // Show alert
        function showAlert(message, type) {
            var alertDiv = document.createElement('div');
            alertDiv.className = 'signal-alert';
            alertDiv.style.borderLeftColor = type === 'success' ? '#00e88f' : '#ff4757';
            alertDiv.innerHTML = `
                <strong>${type === 'success' ? '✓' : '⚠️'}</strong> ${message}
            `;
            document.body.appendChild(alertDiv);
            
            setTimeout(() => {
                alertDiv.remove();
            }, 5000);
        }
        
        // Load chart data
        function loadChartData(asset) {
            fetch(`/api/performance-chart?asset=${asset || ''}&days=30`)
                .then(response => response.json())
                .then(data => {
                    if (data.cumulative && data.cumulative.length > 0) {
                        Plotly.update(profitChart, {
                            y: [data.cumulative]
                        }, {
                            'yaxis.title': 'Profit ($)'
                        });
                        
                        Plotly.update(winRateChart, {
                            y: [data.win_rate]
                        }, {});
                    }
                });
        }
        
        // Load all data
        function loadData() {
            fetch('/api/stats')
                .then(response => response.json())
                .then(data => {
                    updateStats(data);
                    updateAssetsTable(data.assets);
                    document.getElementById('refreshStatus').innerHTML = `Last updated: ${new Date().toLocaleTimeString()}`;
                });
            
            fetch('/api/performance-chart')
                .then(response => response.json())
                .then(data => {
                    if (data.cumulative && data.cumulative.length > 0) {
                        Plotly.update(profitChart, { y: [data.cumulative] });
                        Plotly.update(winRateChart, { y: [data.win_rate] });
                    }
                });
        }
        
        // Socket.IO event handlers
        socket.on('connect', function() {
            console.log('Connected to dashboard');
        });
        
        socket.on('signal_update', function(signals) {
            var activeSignals = [];
            for (var [asset, signal] of Object.entries(signals)) {
                if (signal && signal.direction) {
                    activeSignals.push(`${asset}: ${signal.direction} (${signal.confidence}%)`);
                    showAlert(`${asset} - ${signal.direction} signal! Confidence: ${signal.confidence}%`, 'success');
                }
            }
            
            if (activeSignals.length > 0) {
                console.log('New signals:', activeSignals);
            }
        });
        
        socket.on('stats_update', function(stats) {
            updateStats(stats);
            updateAssetsTable(stats.assets);
        });
        
        // Initial load
        initCharts();
        loadData();
        
        // Refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
