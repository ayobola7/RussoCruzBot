<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUSSO Trading Bot Dashboard</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        .header {
            background: linear-gradient(135deg, #0f1535 0%, #0a0e27 100%);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #11162e;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }
        .assets-table {
            background: #11162e;
            border-radius: 16px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #1e2a4a;
        }
        .badge-call {
            background: rgba(0, 232, 143, 0.15);
            color: #00e88f;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .badge-put {
            background: rgba(255, 71, 87, 0.15);
            color: #ff4757;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .refresh-status {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #6c86a3;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 RUSSO Trading Bot Dashboard</h1>
        <p>Multi-Asset Trading Signals | Real-Time Monitoring</p>
    </div>
    
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card">Loading...</div>
    </div>
    
    <div class="assets-table">
        <table>
            <thead>
                <tr><th>Asset</th><th>Current Signal</th><th>Confidence</th><th>Status</th></tr>
            </thead>
            <tbody id="assetsBody"></tbody>
        </table>
    </div>
    
    <div class="refresh-status" id="refreshStatus">
        Last updated: --:--:--
    </div>
    
    <script>
        function updateDashboard() {
            fetch('/api/current-signals')
                .then(response => response.json())
                .then(data => {
                    let html = '';
                    for (const [asset, signal] of Object.entries(data)) {
                        let signalHtml = '<span class="badge-put">No Signal</span>';
                        if (signal && signal.direction) {
                            signalHtml = `<span class="badge-${signal.direction.toLowerCase()}">${signal.direction} (${signal.confidence}%)</span>`;
                        }
                        html += `<tr><td><strong>${asset}</strong></td><td>${signalHtml}</td><td>${signal?.confidence || '-'}%</td><td>🟢 Active</td></tr>`;
                    }
                    document.getElementById('assetsBody').innerHTML = html;
                    document.getElementById('refreshStatus').innerHTML = `Last updated: ${new Date().toLocaleTimeString()}`;
                });
        }
        
        updateDashboard();
        setInterval(updateDashboard, 30000);
    </script>
</body>
</html>
